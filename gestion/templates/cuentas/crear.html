<!DOCTYPE html>
{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card card-custom shadow">
            <h3 class="text-center titulo mb-3">➕ Crear Cuenta</h3>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-custom w-100">
                    Guardar
                </button>
            </form>

            <a href="/" class="btn btn-link mt-3 text-center">Volver</a>
        </div>

    </div>
</div>

{% endblock %}
