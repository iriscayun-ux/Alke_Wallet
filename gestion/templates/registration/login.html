<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #d8f3dc, #f8f9fa);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .titulo {
            color: #40916c;
            font-weight: bold;
        }

        .btn-custom {
            background-color: #b7e4c7;
            border: none;
        }

        .btn-custom:hover {
            background-color: #95d5b2;
        }

        .alert-custom {
            background-color: #ffe3e3;
            color: #d90429;
            border: none;
        }
    </style>
</head>

<body>

<div class="login-card">

    <!-- LOGO -->
    <img src="{% static 'img/logo.jpeg' %}" width="80" class="mb-3">

    <!-- TITULO -->
    <h3 class="titulo">Bienvenido a Alke Wallet 💳</h3>
    <p class="text-muted">Ingresa para gestionar tus cuentas</p>

    <!-- MENSAJES DE ERROR -->
    {% if form.errors %}
    <div class="alert alert-custom text-center" role="alert">
        Usuario o contraseña incorrecta
    </div>
    {% endif %}

    <!-- FORMULARIO -->
    <form method="post">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label>Usuario</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3 text-start">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-custom w-100">
            Iniciar sesión
        </button>
    </form>

</div>

</body>
</html>
