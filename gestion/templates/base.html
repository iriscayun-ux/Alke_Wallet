<!DOCTYPE html>
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #d8f3dc;
        }

        .titulo {
            color: #40916c;
            font-weight: bold;
        }

        .btn-custom {
            background-color: #b7e4c7;
            border: none;
        }

        .btn-custom:hover {
            background-color: #95d5b2;
        }

        .card-custom {
            background-color: #e9f5db;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- LOGO + NOMBRE -->
        <div class="d-flex align-items-center">
            <img src="{% static 'img/logo.jpeg' %}" width="40" class="me-2">
            <span class="navbar-brand titulo mb-0">Alke Wallet</span>
        </div>

        <!-- BOTONES -->
        <div>
            <a href="/" class="btn btn-custom">Inicio</a>
            <a href="/crear/" class="btn btn-custom">Crear Cuenta</a>
            <a href="/transaccion/" class="btn btn-custom">Transacciones</a>
            <a href="/reporte/" class="btn btn-custom">Reportes</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Salir</button>
</form>
        </div>

    </div>
</nav>

<!-- CONTENIDO DINÁMICO -->
<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
